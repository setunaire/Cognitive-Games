<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Links Page</title>
    <style>
      
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ebebeb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container */
        .button-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns */
            gap: 1rem;
            max-width: 500px;
            width: 100%;
        }

        /* Button Styling */
        .link-btn {
            display: block;
            text-decoration: none;
            color: white;
            background-color: #007bff; 
            padding: 15px 20px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease; 
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Hover Effects */
        .link-btn:hover {
            transform: translateY(-3px); 
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            background-color: #0056b3; 
        }

        /* activeClick effect */
        .link-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .button-container {
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <a href="./1_StarSearch/index.html" class="link-btn">1_StarSearch</a>
        <a href="./2_RainDrop/index.html" class="link-btn">2_RainDrop</a>
        <a href="./3_Go_NoGo/index.html" class="link-btn">3_Go_NoGo</a>
        <a href="./4_Simon/index.html" class="link-btn">4_Simon</a>
        <a href="./5_MemoryMatrix/index.html" class="link-btn">5_MemoryMatrix</a>
        <a href="./6_BrainShift/index.html" class="link-btn">6_BrainShift</a>
    </div>

</body>
</html>
